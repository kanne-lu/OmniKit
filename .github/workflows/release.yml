name: Release OmniKit

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release-windows:
    runs-on: windows-latest
    steps:
      - name: Check out the release tag
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install frontend dependencies
        run: npm ci

      - name: Build signed Windows update assets
        run: npm run tauri build -- --bundles nsis
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Create updater manifest
        shell: pwsh
        env:
          RELEASE_TAG: ${{ github.ref_name }}
          REPOSITORY: ${{ github.repository }}
        run: |
          $updater = Get-ChildItem "src-tauri/target/release/bundle/nsis" -Filter "*.exe" | Select-Object -First 1
          if (-not $updater) { throw "Tauri updater archive was not produced." }
          $signaturePath = "$($updater.FullName).sig"
          if (-not (Test-Path $signaturePath)) { throw "Tauri updater signature was not produced." }
          $manifest = @{
            version = $env:RELEASE_TAG.TrimStart('v')
            notes = "See the GitHub Release notes for this version."
            pub_date = (Get-Date).ToUniversalTime().ToString("o")
            platforms = @{
              "windows-x86_64" = @{
                signature = (Get-Content -Raw $signaturePath).Trim()
                url = "https://github.com/$env:REPOSITORY/releases/download/$env:RELEASE_TAG/$($updater.Name)"
              }
            }
          }
          New-Item -ItemType Directory -Force "release" | Out-Null
          $manifest | ConvertTo-Json -Depth 5 | Set-Content -Encoding utf8 "release/latest.json"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.exe.sig
            release/latest.json
